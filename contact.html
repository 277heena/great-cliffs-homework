<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css">
</head>

<body id="contact" onload="disableButton(true)">

<div class="container">

    <header>
        <div class="main-header">
            <div class="logo">
                <h1>Great Cliffs</h1>
            </div>

            <nav class="main-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="cliffs.html">Cliffs</a></li>
                    <li><a href="activities.html">Activities</a></li>
                    <li><a class="active" href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h2>Contact Us</h2>

        <form>
            <label>Name</label>
            <input type="text" name="name">

            <label>Email</label>
            <input type="email" name="email">

            <label>Phone</label>
            <input type="text" name="phone">

            <label>Message</label>
            <textarea rows="5" name="message"></textarea>

            <div class="commentbox">
                <label>How did you hear about us:</label>
                <textarea name="comments"></textarea>
            </div>

            <div class="randomcode">
                <input type="text" name="randomcode" placeholder="Enter characters">
                <p id="codes"></p>
            </div>

            <div class="button">
                <input type="submit" id="submit" value="Inquire">
            </div>
        </form>
    </main>

    <section id="partners">
        <h2>Our Partners</h2>
        <ul id="partners-list"></ul>
    </section>

    <footer>
        <div>2026 Great Cliffs</div>
        <div>Outdoor Adventures</div>
    </footer>

</div>

<script src="js/site_scripts.js"></script>
<script src="js/randomcodes.js"></script>
</body>
</html>
